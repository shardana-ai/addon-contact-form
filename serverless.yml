# Serverless Framework config for the contact-form Lambda.
#
# One deploy = one form. Configure the recipient mapping with env vars at
# deploy time; there is no central registry.
#
#   export MAILGUN_DOMAIN=mg.example.com
#   export MAILGUN_API_KEY=key-...
#   export MAIL_FROM="no-reply@example.com"
#   export MAIL_TO="owner@example.com"
#   # optional
#   export MAIL_REPLY_TO="support@example.com"
#   export MAILGUN_BASE_URL="https://api.eu.mailgun.net"
#   export ALLOWED_ORIGINS="https://my-landing.example,https://www.my-landing.example"
#
#   pnpm install && pnpm build
#   serverless deploy --stage prod --region eu-south-1
#
# The Lambda handler reads MAIL_FROM / MAIL_TO directly — no mapping
# layer between the request and the recipient.

service: contact-form

frameworkVersion: "3"

provider:
  name: aws
  runtime: nodejs20.x
  region: ${opt:region, 'eu-south-1'}
  stage: ${opt:stage, 'prod'}
  memorySize: 256
  timeout: 10
  architecture: arm64
  logRetentionInDays: 30
  httpApi:
    cors:
      allowedOrigins: ${env:ALLOWED_ORIGINS_LIST, '*'}
      allowedMethods:
        - POST
        - OPTIONS
      allowedHeaders:
        - Content-Type
      maxAge: 600
  environment:
    MAILGUN_DOMAIN: ${env:MAILGUN_DOMAIN}
    MAILGUN_API_KEY: ${env:MAILGUN_API_KEY}
    MAILGUN_BASE_URL: ${env:MAILGUN_BASE_URL, ''}
    MAIL_FROM: ${env:MAIL_FROM}
    MAIL_TO: ${env:MAIL_TO}
    MAIL_REPLY_TO: ${env:MAIL_REPLY_TO, ''}
    ALLOWED_ORIGINS: ${env:ALLOWED_ORIGINS, '*'}

package:
  individually: true
  patterns:
    - "!**"
    - "dist/lambda/**"

functions:
  submit:
    handler: dist/lambda/submit.handler
    events:
      - httpApi:
          path: /v1/submit
          method: post
      - httpApi:
          path: /v1/submit
          method: options
