name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile=false
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test

      - name: Verify widget bundle is reasonable (< 6 KB gzip)
        run: |
          SIZE=$(gzip -c dist/widget/widget.global.js | wc -c)
          echo "Widget gzip size: $SIZE bytes"
          if [ "$SIZE" -gt 6144 ]; then
            echo "::error::Widget bundle exceeds 6KB gzip budget ($SIZE bytes)"
            exit 1
          fi
